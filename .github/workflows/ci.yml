name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['22.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            studio-ui/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Install studio-ui deps
        run: npm --prefix studio-ui ci

      - name: Lint (no raw console in OAuth code)
        run: npm run lint:no-raw-console

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (backend + UI bundle)
        run: npm run build
