# Build and distribute Studio Pro.
# macOS → signed + notarized DMG (drag-to-Applications).
# Linux  → .tar.gz (execute bit preserved).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            pkg_target: node22-macos-arm64
            artifact_name: studio-pro-aarch64-apple-darwin
          - os: ubuntu-latest
            pkg_target: node22-linux-x64
            artifact_name: studio-pro-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            pkg_target: node22-linux-arm64
            artifact_name: studio-pro-aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (macOS only)
        if: runner.os == 'macOS'
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Runtimes/ || true
          sudo rm -rf /Applications/Xcode_*.app || true
          df -h

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install studio-ui dependencies
        run: npm --prefix studio-ui ci

      - name: Embed bundled OAuth credentials
        env:
          GCP_CLIENT_ID: ${{ secrets.PLATFORM_GCP_OAUTH_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.PLATFORM_GCP_OAUTH_CLIENT_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const id = process.env.GCP_CLIENT_ID || '';
            const secret = process.env.GCP_CLIENT_SECRET || '';
            fs.writeFileSync('src/core/gcp/gcp-oauth-credentials.ts',
              \`export const BUNDLED_GCP_CLIENT_ID = '\${id}';\nexport const BUNDLED_GCP_CLIENT_SECRET = '\${secret}';\n\`
            );
          "

      - name: Build backend + UI
        run: npm run build

      - name: Package CLI (single binary)
        env:
          STUDIO_PKG_NODE: node22
        run: node scripts/build-cli.js --target=${{ matrix.pkg_target }}

      # ── macOS: .app bundle → signed DMG → notarized → stapled ──────────────
      - name: Build signed DMG (macOS only)
        if: runner.os == 'macOS'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          NOTARIZATION_KEY_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ISSUER_ID }}
          NOTARIZATION_KEY_P8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          BINARY: binaries/${{ matrix.artifact_name }}
          VERSION: ${{ github.ref_name }}
        run: |
          # ── keychain ──────────────────────────────────────────────────────
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 900 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')
          echo "Signing with: $IDENTITY"

          # ── .app bundle ───────────────────────────────────────────────────
          APP="$RUNNER_TEMP/Studio Pro.app"
          mkdir -p "$APP/Contents/MacOS"
          cp "$BINARY" "$APP/Contents/MacOS/studio-pro"
          chmod +x "$APP/Contents/MacOS/studio-pro"

          # Copy app icon if present
          if [ -f "studio-ui/public/studio-pro-icon.png" ]; then
            mkdir -p "$APP/Contents/Resources"
            # Convert PNG → icns using sips + iconutil
            ICONSET="$RUNNER_TEMP/icon.iconset"
            mkdir -p "$ICONSET"
            for size in 16 32 64 128 256 512; do
              sips -z $size $size "studio-ui/public/studio-pro-icon.png" --out "$ICONSET/icon_${size}x${size}.png" > /dev/null
              sips -z $((size*2)) $((size*2)) "studio-ui/public/studio-pro-icon.png" --out "$ICONSET/icon_${size}x${size}@2x.png" > /dev/null
            done
            iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"
          fi

          # Write Info.plist
          SHORT_VER="${VERSION#v}"
          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Studio Pro</string>
            <key>CFBundleDisplayName</key><string>Studio Pro</string>
            <key>CFBundleIdentifier</key><string>com.sidmoparthi.studio-pro</string>
            <key>CFBundleExecutable</key><string>studio-pro</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleVersion</key><string>${SHORT_VER}</string>
            <key>CFBundleShortVersionString</key><string>${SHORT_VER}</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSUIElement</key><false/>
          </dict>
          </plist>
          EOF

          # ── entitlements ──────────────────────────────────────────────────
          # allow-jit + allow-unsigned-executable-memory: required for V8/Node.js
          # disable-library-validation: required for pkg-extracted native addons
          #   (.node files are extracted unsigned to ~/.cache/pkg; without this,
          #   hardened runtime rejects dlopen due to Team ID mismatch)
          ENTITLEMENTS="$RUNNER_TEMP/entitlements.plist"
          cat > "$ENTITLEMENTS" << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key><true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>
            <key>com.apple.security.cs.disable-library-validation</key><true/>
          </dict>
          </plist>
          ENTEOF

          # ── sign .app ─────────────────────────────────────────────────────
          codesign --sign "$IDENTITY" \
            --options runtime \
            --timestamp \
            --force \
            --deep \
            --entitlements "$ENTITLEMENTS" \
            "$APP"

          # ── create DMG ────────────────────────────────────────────────────
          DMG_STAGING="$RUNNER_TEMP/dmg_staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          DMG_PATH="binaries/Studio-Pro-${VERSION}.dmg"
          hdiutil create \
            -volname "Studio Pro" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          # ── sign DMG ──────────────────────────────────────────────────────
          codesign --sign "$IDENTITY" --timestamp "$DMG_PATH"

          # ── notarize DMG ──────────────────────────────────────────────────
          echo "$NOTARIZATION_KEY_P8" > $RUNNER_TEMP/notary.p8
          xcrun notarytool submit "$DMG_PATH" \
            --key $RUNNER_TEMP/notary.p8 \
            --key-id "$NOTARIZATION_KEY_ID" \
            --issuer "$NOTARIZATION_KEY_ISSUER_ID" \
            --wait

          # ── staple (works on DMGs) ─────────────────────────────────────
          xcrun stapler staple "$DMG_PATH"

          # ── clean up ──────────────────────────────────────────────────────
          rm -f $RUNNER_TEMP/cert.p12 $RUNNER_TEMP/notary.p8
          security delete-keychain "$KEYCHAIN_PATH"

      # ── Linux: tarball preserves execute bit ────────────────────────────
      - name: Package as tarball (Linux only)
        if: runner.os == 'Linux'
        run: |
          chmod +x binaries/${{ matrix.artifact_name }}
          tar -czf binaries/${{ matrix.artifact_name }}.tar.gz -C binaries ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            binaries/Studio-Pro-*.dmg
            binaries/${{ matrix.artifact_name }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Stage release files
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.dmg' -o -name '*.tar.gz' \) -exec cp {} upload/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
