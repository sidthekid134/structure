# Build pkg binaries for Studio Pro CLI and attach them to GitHub Releases (tags v*).
# Homebrew tap formula lives in a separate repo; point artifact URLs at this release.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            pkg_target: node20-macos-arm64
            artifact_name: studio-pro-aarch64-apple-darwin
          - os: ubuntu-latest
            pkg_target: node20-linux-x64
            artifact_name: studio-pro-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            pkg_target: node20-linux-arm64
            artifact_name: studio-pro-aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install studio-ui dependencies
        run: npm --prefix studio-ui ci

      - name: Embed bundled OAuth credentials
        env:
          GCP_CLIENT_ID: ${{ secrets.PLATFORM_GCP_OAUTH_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.PLATFORM_GCP_OAUTH_CLIENT_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const id = process.env.GCP_CLIENT_ID || '';
            const secret = process.env.GCP_CLIENT_SECRET || '';
            fs.writeFileSync('src/core/gcp/gcp-oauth-credentials.ts',
              \`export const BUNDLED_GCP_CLIENT_ID = '\${id}';\nexport const BUNDLED_GCP_CLIENT_SECRET = '\${secret}';\n\`
            );
          "

      - name: Build backend + UI
        run: npm run build

      - name: Package CLI (single binary)
        env:
          STUDIO_PKG_NODE: node20
        run: node scripts/build-cli.js --target=${{ matrix.pkg_target }}

      - name: Sign and notarize (macOS only)
        if: runner.os == 'macOS'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          NOTARIZATION_KEY_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ISSUER_ID }}
          NOTARIZATION_KEY_P8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          BINARY: binaries/${{ matrix.artifact_name }}
        run: |
          # Import certificate into a temporary keychain so it doesn't persist on the runner
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 900 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Sign with hardened runtime (required for notarization)
          codesign --sign "Developer ID Application: $(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')" \
            --options runtime \
            --timestamp \
            --force \
            "$BINARY"

          # Write notarization key to temp file (safer than passing on command line)
          echo "$NOTARIZATION_KEY_P8" > $RUNNER_TEMP/notary.p8

          # Zip for submission (notarytool requires an archive for bare binaries)
          zip -j $RUNNER_TEMP/notarize.zip "$BINARY"

          # Submit and wait (typically 1-3 minutes)
          xcrun notarytool submit $RUNNER_TEMP/notarize.zip \
            --key $RUNNER_TEMP/notary.p8 \
            --key-id "$NOTARIZATION_KEY_ID" \
            --issuer "$NOTARIZATION_KEY_ISSUER_ID" \
            --wait

          # Staple the notarization ticket to the binary so it passes Gatekeeper offline
          xcrun stapler staple "$BINARY"

          # Clean up
          rm -f $RUNNER_TEMP/cert.p12 $RUNNER_TEMP/notary.p8 $RUNNER_TEMP/notarize.zip
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: binaries/${{ matrix.artifact_name }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Stage binaries for release
        run: |
          mkdir -p upload
          find release-assets -type f \( -name 'studio-pro-*' -o -name 'studio-pro-*.exe' \) -exec cp {} upload/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
