name: cloud-run-delivery
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build API container
        run: |
          gcloud builds submit . \
            --tag ${{ secrets.ARTIFACT_REGISTRY_REPO }}/test12-api:${{ github.sha }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy test12-api \
            --image ${{ secrets.ARTIFACT_REGISTRY_REPO }}/test12-api:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --quiet

      - name: Promote API traffic
        run: |
          gcloud run services update-traffic test12-api \
            --to-latest \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --quiet

  rollback:
    runs-on: ubuntu-latest
    if: failure()
    needs: [build-deploy]
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Rollback to previous revision
        run: |
          PREV=$(gcloud run revisions list \
            --service test12-api \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --sort-by=~metadata.creationTimestamp \
            --format='value(metadata.name)' \
            --limit=2 | tail -1)
          gcloud run services update-traffic test12-api \
            --to-revisions=$PREV=100 \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --quiet
